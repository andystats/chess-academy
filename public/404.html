<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Chess Academy</title>
    <!--
      GitHub Pages has no SPA rewrite, so a deep link like /chess-academy/lesson/classics/the-center
      hits this 404 page. This is the standard spa-github-pages redirect (rafgraph): it encodes the
      requested path into a query string and bounces to the app root, where a snippet in index.html
      restores the real URL before the router mounts. pathSegmentsToKeep = 1 for a project page
      served from /<repo>/ (use 0 for a user/custom-domain root deploy).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
