name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads the repo; never expose a writable token to `npm ci` lifecycle scripts.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run validate-content
      - run: npm test
      - run: npm run build
