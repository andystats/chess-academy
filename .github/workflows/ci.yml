name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI only reads the repo; never expose a writable token to `npm ci` lifecycle scripts.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run validate-content
      - run: npm test
      - run: npm run build
