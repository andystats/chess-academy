name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue rather than cancel: interrupting actions/deploy-pages mid-publish can leave the
# deployment in a bad state (GitHub's Pages starter workflow does the same).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # On a project Pages site the app is served from /<repo>/, so the build
      # base path must match the repository name. The router reads it from
      # import.meta.env.BASE_URL, keeping client routes in sync.
      # Multiplayer (online arena) talks to Supabase Realtime from the browser. The values are
      # public-by-design (the anon key ships in the bundle; the channel is unauthenticated) and live
      # in repo Actions secrets only so they aren't hard-coded here. We write them to .env.production
      # rather than passing them via the step `env:` because Vite reliably inlines `import.meta.env`
      # from .env files at build time; absent secrets just yield an empty file → online mode degrades
      # gracefully (see src/lib/supabase.js).
      - name: Write Supabase env for the build
        run: |
          {
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}"
            echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          } > .env.production
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      # SPA deep links are handled by public/404.html (copied to dist by Vite) plus a restore
      # snippet in index.html — see those files. No copy step needed.
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
