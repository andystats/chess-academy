name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # On a project Pages site the app is served from /<repo>/, so the build
      # base path must match the repository name. The router reads it from
      # import.meta.env.BASE_URL, keeping client routes in sync.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      # SPA deep links are handled by public/404.html (copied to dist by Vite) plus a restore
      # snippet in index.html — see those files. No copy step needed.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
